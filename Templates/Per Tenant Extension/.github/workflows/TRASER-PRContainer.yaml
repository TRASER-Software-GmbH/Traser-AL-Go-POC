name: 'Create PR Container'

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main, staging ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: read

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  Initialization:
    needs: [ ]
    if: (!failure() && !cancelled())
    runs-on: [ windows-latest ]
    outputs:
      githubRunner: ${{ steps.ReadSettings.outputs.GitHubRunnerJson }}
      githubRunnerShell: ${{ steps.ReadSettings.outputs.GitHubRunnerShell }}
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
      containerUsername: ${{ steps.ReadSecrets.outputs.containerUsername }}
      containerPassword: ${{ steps.ReadSecrets.outputs.containerPassword }}
      bcLicense: ${{ steps.ReadSecrets.outputs.bcLicense }}
      bcVersion: ${{ steps.DetermineSettings.outputs.bcVersion }}
    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@main
        with:
          shell: powershell

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.event_name == 'pull_request' && github.sha || format('refs/pull/{0}/merge', github.event.pull_request.number) }}

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@main
        with:
          shell: powershell

      - name: Read settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@main
        with:
          shell: powershell
          get: bcVersion

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@main
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: 'bcLicense,containerUsername,containerPassword'

      - name: Determine Settings
        id: DetermineSettings
        run: |
          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "bcVersion=$($env:bcVersion)"

  CreatePRContainer:
    needs: [ Initialization ]
    if: (!failure() && !cancelled())
    runs-on: ${{ fromJson(needs.Initialization.outputs.githubRunner) }}
    steps:
    - name: Create PR Container
      id: CreatePRContainer
      uses: microsoft/AL-Go-Actions/CreatePRContainer@main
      with:
        shell: ${{ needs.Initialization.outputs.githubRunnerShell }}
        runs-on: ${{ needs.Initialization.outputs.githubRunner }}
        pullRequestNumber: ${{ github.event.pull_request.number }}
        containerUsername: ${{ needs.Initialization.outputs.containerUsername }}
        containerPassword: ${{ needs.Initialization.outputs.containerPassword }}
        bcLicense: ${{ needs.Initialization.outputs.bcLicense }}
        bcVersion: ${{ needs.Initialization.outputs.bcVersion }}
        nugetFeedsToken: ${{ secrets.NUGET_FEEDS_TOKEN }}

    - name: Cleanup on Failure
      id: CleanupOnFailure
      if: failure()
      uses: microsoft/AL-Go-Actions/CleanupPRContainer@main
      with:
        shell: ${{ needs.Initialization.outputs.githubRunnerShell }}
        pullRequestNumber: ${{ github.event.pull_request.number }}
